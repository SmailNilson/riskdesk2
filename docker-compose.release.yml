services:
  postgres:
    image: postgres:16-alpine
    container_name: riskdesk-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-riskdesk}
      POSTGRES_USER: ${POSTGRES_USER:-riskdesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-riskdesk_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    image: ${RISKDESK_API_IMAGE:?Set RISKDESK_API_IMAGE to the published GHCR tag}
    container_name: riskdesk-api
    restart: unless-stopped
    pull_policy: always
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/riskdesk}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-riskdesk}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-riskdesk_dev}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-pro-preview}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
    depends_on:
      - postgres

volumes:
  pgdata:

name: Tag & Deploy

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
        default: patch
      skip_tests:
        description: 'Skip tests (emergency hotfix only)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  ZONE: ${{ vars.GCP_ZONE }}
  REPOSITORY: ${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY }}
  INSTANCE_NAME: ${{ vars.GCP_INSTANCE_NAME }}
  CONFIG_BUCKET: ${{ vars.GCP_CONFIG_BUCKET }}
  WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  DEPLOY_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

jobs:
  # ── Job 1: Compute next version from latest tag ──
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.next.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: next
        run: |
          LATEST=$(git tag --sort=-v:refname | grep '^v[0-9]' | head -1)
          if [ -z "$LATEST" ]; then
            echo "tag=v1.0.0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
          if [ "${{ inputs.version_bump }}" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          echo "tag=v${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Print version
        run: echo "Will tag and deploy ${{ steps.next.outputs.tag }}"

  # ── Job 2: Test backend ──
  test-backend:
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: mvn -q package
      - uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: target/riskdesk-*.jar
          if-no-files-found: error
          retention-days: 1

  # ── Job 2b: Build JAR without tests (emergency) ──
  build-backend-no-tests:
    runs-on: ubuntu-latest
    if: ${{ inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: mvn -q -DskipTests package
      - uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: target/riskdesk-*.jar
          if-no-files-found: error
          retention-days: 1

  # ── Job 3: Lint frontend ──
  lint-frontend:
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        env:
          RISKDESK_API_PROXY_TARGET: http://localhost:8080
        run: npm run lint

  # ── Job 4: Tag, build images, push to Artifact Registry ──
  tag-build-push:
    runs-on: ubuntu-latest
    needs: [version, test-backend, lint-frontend]
    if: |
      always() &&
      needs.version.result == 'success' &&
      (needs.test-backend.result == 'success' || needs.test-backend.result == 'skipped') &&
      (needs.lint-frontend.result == 'success' || needs.lint-frontend.result == 'skipped')
    environment: production
    outputs:
      backend_image: ${{ steps.images.outputs.backend_image }}
      frontend_image: ${{ steps.images.outputs.frontend_image }}
      ibkr_gateway_image: ${{ steps.images.outputs.ibkr_gateway_image }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create git tag
        env:
          IMAGE_TAG: ${{ needs.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${IMAGE_TAG}" -m "Release ${IMAGE_TAG}"
          git push origin "${IMAGE_TAG}"

      - name: Download backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend-jar/

      - uses: docker/setup-buildx-action@v3

      - name: Prepare image names
        id: images
        env:
          IMAGE_TAG: ${{ needs.version.outputs.tag }}
        run: |
          echo "backend_image=${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/riskdesk-backend:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/riskdesk-frontend:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "ibkr_gateway_image=${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/ibkr-gateway:stable" >> "$GITHUB_OUTPUT"

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build backend image
        env:
          IMAGE_TAG: ${{ needs.version.outputs.tag }}
        run: |
          cat > backend-jar/Dockerfile <<'EOF'
          FROM eclipse-temurin:21-jre-alpine
          ARG APP_VERSION=0.1.0-SNAPSHOT
          ARG APP_GIT_SHA=unknown
          ARG APP_IMAGE_TAG=unknown
          ARG APP_BUILD_TIME=unknown
          WORKDIR /app
          ENV APP_VERSION="${APP_VERSION}" \
              APP_GIT_SHA="${APP_GIT_SHA}" \
              APP_IMAGE_TAG="${APP_IMAGE_TAG}" \
              APP_BUILD_TIME="${APP_BUILD_TIME}"
          LABEL org.opencontainers.image.version="${APP_VERSION}" \
                org.opencontainers.image.revision="${APP_GIT_SHA}" \
                org.opencontainers.image.created="${APP_BUILD_TIME}"
          COPY riskdesk-*.jar app.jar
          EXPOSE 8080
          ENTRYPOINT ["java", "-jar", "app.jar"]
          EOF
          docker buildx build \
            --build-arg APP_VERSION="${IMAGE_TAG}" \
            --build-arg APP_GIT_SHA="${GITHUB_SHA::7}" \
            --build-arg APP_IMAGE_TAG="${IMAGE_TAG}" \
            --build-arg APP_BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "${{ steps.images.outputs.backend_image }}" \
            --load \
            backend-jar/

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          build-args: |
            NEXT_PUBLIC_API_URL=
            NEXT_PUBLIC_WS_URL=
            RISKDESK_API_PROXY_TARGET=http://backend:8080
          tags: ${{ steps.images.outputs.frontend_image }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          load: true

      - name: Pull upstream IBKR gateway image
        run: docker pull ghcr.io/gnzsnz/ib-gateway:stable

      - name: Tag and push all images
        run: |
          docker tag ghcr.io/gnzsnz/ib-gateway:stable "${{ steps.images.outputs.ibkr_gateway_image }}"
          docker push "${{ steps.images.outputs.backend_image }}" &
          docker push "${{ steps.images.outputs.frontend_image }}" &
          docker push "${{ steps.images.outputs.ibkr_gateway_image }}" &
          wait

  # ── Job 5: Deploy to GCE VM ──
  deploy:
    runs-on: ubuntu-latest
    needs: [version, tag-build-push]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Upload runtime config bundle
        run: |
          gcloud storage cp infra/gcp/docker-compose.gce.yml "gs://${CONFIG_BUCKET}/riskdesk/docker-compose.gce.yml" &
          gcloud storage cp infra/gcp/render-secrets-env.sh "gs://${CONFIG_BUCKET}/riskdesk/render-secrets-env.sh" &
          gcloud storage cp infra/gcp/backup-postgres-to-gcs.sh "gs://${CONFIG_BUCKET}/riskdesk/backup-postgres-to-gcs.sh" &
          gcloud storage cp infra/gcp/refresh-runtime-on-vm.sh "gs://${CONFIG_BUCKET}/riskdesk/refresh-runtime-on-vm.sh" &
          gcloud storage cp infra/docker/nginx/local-prod.conf "gs://${CONFIG_BUCKET}/riskdesk/nginx/local-prod.conf" &
          gcloud storage cp infra/docker/postgres/init/01-extensions.sql "gs://${CONFIG_BUCKET}/riskdesk/postgres-init/01-extensions.sql" &
          wait

      - name: Deploy on VM and wait for healthy backend
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_SSH_USER: ${{ vars.GCP_DEPLOY_SSH_USER || secrets.DEPLOY_SSH_USER }}
        run: |
          : "${DEPLOY_SSH_PRIVATE_KEY:?DEPLOY_SSH_PRIVATE_KEY secret is required}"
          : "${DEPLOY_SSH_USER:?Set GCP_DEPLOY_SSH_USER repository variable or DEPLOY_SSH_USER secret to the VM user that owns the deploy key}"

          mkdir -p "$HOME/.ssh"
          printf '%s\n' "${DEPLOY_SSH_PRIVATE_KEY}" | tr -d '\r' > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keygen -y -f "$HOME/.ssh/deploy_key" > "$HOME/.ssh/deploy_key.pub"
          echo "Using deploy SSH user ${DEPLOY_SSH_USER}"

          gcloud compute start-iap-tunnel "${INSTANCE_NAME}" 22 \
            --zone "${ZONE}" \
            --local-host-port=localhost:2222 \
            --project "${PROJECT_ID}" &
          IAP_PID=$!
          echo "IAP tunnel PID=${IAP_PID} — waiting for it to bind..."
          for i in $(seq 1 15); do nc -z localhost 2222 2>/dev/null && break; sleep 1; done

          SSH="ssh -i $HOME/.ssh/deploy_key
                   -o IdentitiesOnly=yes
                   -o StrictHostKeyChecking=no
                   -o UserKnownHostsFile=/dev/null
                   -o ConnectTimeout=15
                   -p 2222 ${DEPLOY_SSH_USER}@localhost"

          DEPLOY_OK=false
          for attempt in 1 2 3; do
            $SSH "sudo bash -lc 'gcloud storage cp gs://${CONFIG_BUCKET}/riskdesk/refresh-runtime-on-vm.sh /opt/riskdesk/refresh-runtime-on-vm.sh && chmod +x /opt/riskdesk/refresh-runtime-on-vm.sh && BACKEND_IMAGE=\"${{ needs.tag-build-push.outputs.backend_image }}\" FRONTEND_IMAGE=\"${{ needs.tag-build-push.outputs.frontend_image }}\" IBKR_GATEWAY_IMAGE=\"${{ needs.tag-build-push.outputs.ibkr_gateway_image }}\" /opt/riskdesk/refresh-runtime-on-vm.sh && timeout 480 bash -c \"until curl -sf http://localhost:3000/actuator/health 2>/dev/null | grep -q UP; do echo waiting for backend...; sleep 3; done\" && echo Deploy OK'" \
              && DEPLOY_OK=true && break
            echo "SSH attempt ${attempt}/3 failed — retrying in 15s..."
            [ "${attempt}" -lt 3 ] && sleep 15
          done

          kill "${IAP_PID}" 2>/dev/null || true
          $DEPLOY_OK || { echo "All SSH attempts failed — deploy aborted"; exit 1; }

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.task.scheduling.enabled=false
riskdesk.risk.max-margin-usage-pct=80.0
riskdesk.risk.max-single-position-pct=25.0
riskdesk.market-data.historical.enabled=false
riskdesk.ibkr.enabled=false
riskdesk.mentor.memory-enabled=false
riskdesk.mentor.embeddings-enabled=false

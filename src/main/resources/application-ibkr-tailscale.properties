# Profile for connecting to the IBKR Gateway running on riskdesk-prod
# via Tailscale (100.113.139.64) — no SSH tunnel required.
#
# Usage: -Dspring-boot.run.profiles=ibkr-tailscale,local
#
# Make sure Tailscale is active and riskdesk-prod is reachable:
#   tailscale status | grep riskdesk-prod

spring.datasource.username=${DB_USERNAME:ismailassri}

riskdesk.ibkr.native-host=${RISKDESK_IBKR_NATIVE_HOST:100.113.139.64}
riskdesk.ibkr.native-port=${RISKDESK_IBKR_NATIVE_PORT:4001}
# Convention: Claude=8, Codex=7, MAQ=9, human=1
riskdesk.ibkr.native-client-id=${RISKDESK_IBKR_NATIVE_CLIENT_ID:8}
riskdesk.ibkr.native-read-only=true

server.port=${RISKDESK_LOCAL_BACKEND_PORT:8080}

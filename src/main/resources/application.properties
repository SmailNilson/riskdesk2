spring.application.name=riskdesk
spring.devtools.restart.enabled=false
spring.devtools.add-properties=false
spring.devtools.livereload.enabled=false

# Database - PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/riskdesk
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=ismailassri
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Server
server.port=8080

# WebSocket
spring.websocket.max-text-message-size=65536

# Market data polling interval (ms)
# IB Gateway / native API polling
riskdesk.market-data.poll-interval=3000

# Historical OHLCV fetch on startup from IBKR
riskdesk.market-data.historical.enabled=true
riskdesk.market-data.historical.backfill-days-10m=90
riskdesk.market-data.historical.backfill-days-1h=365
riskdesk.market-data.historical.mentor-refresh-timeout-ms=2500
riskdesk.market-data.historical.mentor-refresh-cooldown-ms=60000

# Other market-data providers intentionally disabled.
riskdesk.yahoo.enabled=false

# ─── IBKR Backend ─────────────────────────────────────────────────────────────
# Recommended mode:
#   IB_GATEWAY = native socket API via TWS / IB Gateway
# Legacy compatibility:
#   CLIENT_PORTAL = REST/Web API gateway
# Native setup:
#   1. Start TWS or IB Gateway
#   2. Enable API socket connections
#   3. Keep host/port/client-id below aligned with that client
riskdesk.ibkr.enabled=true
riskdesk.ibkr.mode=IB_GATEWAY
riskdesk.ibkr.gateway-url=https://localhost:5001
riskdesk.ibkr.native-host=127.0.0.1
riskdesk.ibkr.native-port=4001
riskdesk.ibkr.native-client-id=7
riskdesk.ibkr.native-read-only=true
riskdesk.ibkr.ssl-verify=false
riskdesk.ibkr.connect-timeout-ms=5000
riskdesk.ibkr.read-timeout-ms=30000

# Risk thresholds
riskdesk.risk.max-margin-usage-pct=80.0
riskdesk.risk.max-single-position-pct=25.0
riskdesk.risk.max-correlation-exposure-pct=50.0

# Telegram alerts (configure your bot)
riskdesk.alerts.telegram.enabled=false
riskdesk.alerts.telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
riskdesk.alerts.telegram.chat-id=${TELEGRAM_CHAT_ID:}

# Mentor AI (Gemini)
riskdesk.mentor.enabled=true
riskdesk.mentor.api-key=${GEMINI_API_KEY:}
riskdesk.mentor.model=${GEMINI_MODEL:gemini-3.1-pro-preview}
riskdesk.mentor.endpoint=https://generativelanguage.googleapis.com
riskdesk.mentor.timeout-ms=60000
riskdesk.mentor.persist-audits=true
riskdesk.mentor.memory-enabled=true
riskdesk.mentor.memory-top-k=3
riskdesk.mentor.memory-search-window=200
riskdesk.mentor.embeddings-enabled=true
riskdesk.mentor.embeddings-model=${GEMINI_EMBEDDING_MODEL:gemini-embedding-001}
riskdesk.mentor.embedding-dimensions=768
riskdesk.mentor.import.enabled=false
riskdesk.mentor.import.file-path=
riskdesk.mentor.import.embedding-model=${GEMINI_EMBEDDING_MODEL:gemini-embedding-001}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=RiskDesk
info.app.version=0.1.0-SNAPSHOT
info.app.description=Risk management dashboard for futures traders

# OpenAPI / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Logging
logging.level.com.riskdesk=INFO
logging.level.org.springframework.web.socket=INFO
logging.level.org.springframework.boot.devtools.env.DevToolsPropertyDefaultsPostProcessor=OFF

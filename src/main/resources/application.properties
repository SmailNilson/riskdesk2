spring.application.name=riskdesk
spring.devtools.restart.enabled=false
spring.devtools.add-properties=false
spring.devtools.livereload.enabled=false

# Database - PostgreSQL
# Override username/password in application-local.properties (gitignored)
spring.datasource.url=jdbc:postgresql://localhost:5432/riskdesk
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:riskdesk}
spring.datasource.password=${DB_PASSWORD:}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Server
# Default port — override in application-local.properties per agent (Claude=8090, Codex=8080)
server.port=8080

# WebSocket
spring.websocket.max-text-message-size=65536

# Async task executor — used by @Async listeners (e.g. WaveTrendSignalScanner).
# Keeps heavy indicator computation off the @Scheduled polling thread.
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=64
spring.task.execution.thread-name-prefix=riskdesk-async-

# Market data polling interval (ms)
# With push-based streaming active, this serves as a fallback safety net.
# Push updates arrive in <100ms; this poll catches any missed ticks.
riskdesk.market-data.poll-interval=30000

# Historical OHLCV fetch on startup from IBKR
riskdesk.market-data.historical.enabled=true
# 1-min is the canonical base for backtests (resampled upward) + 1m order-flow cadence.
# Deep 1m backfill is chunked day-by-day with IBKR pacing — keep the window modest.
riskdesk.market-data.historical.backfill-days-1m=30
riskdesk.market-data.historical.backfill-days-5m=30
riskdesk.market-data.historical.backfill-days-10m=90
riskdesk.market-data.historical.backfill-days-30m=180
riskdesk.market-data.historical.backfill-days-1h=365
riskdesk.market-data.historical.backfill-days-4h=730
riskdesk.market-data.historical.mentor-refresh-timeout-ms=2500
riskdesk.market-data.historical.mentor-refresh-cooldown-ms=60000
# Max width (days) of an on-demand deep range backfill (POST /api/candles/backfill/...).
# Guards IBKR pacing — a 1m window pages day-by-day with a 2s delay per chunk. ~200d covers the
# practical IBKR 1m depth (~6 months) for futures; the contract walk auto-scales to the window.
riskdesk.market-data.historical.backfill-range-max-days=200

# Cursor-paginated range read (GET /api/candles/{instrument}/{timeframe}/range).
# Default and hard-cap page size for streaming long 1m windows into backtests.
riskdesk.candles.range.default-page-size=5000
riskdesk.candles.range.max-page-size=50000

# Other market-data providers intentionally disabled.
riskdesk.yahoo.enabled=false

# ─── IBKR Backend ─────────────────────────────────────────────────────────────
# Recommended mode:
#   IB_GATEWAY = native socket API via TWS / IB Gateway
# Legacy compatibility:
#   CLIENT_PORTAL = REST/Web API gateway
# Native setup:
#   1. Start TWS or IB Gateway
#   2. Enable API socket connections
#   3. Keep host/port/client-id below aligned with that client
riskdesk.ibkr.enabled=true
riskdesk.ibkr.mode=IB_GATEWAY
riskdesk.ibkr.gateway-url=https://localhost:5001
riskdesk.ibkr.native-host=127.0.0.1
riskdesk.ibkr.native-port=4001
# client-id MUST be unique per agent — override in application-local.properties
# Convention: Claude=8, Codex=7, MAQ=9, human=1
riskdesk.ibkr.native-client-id=${IBKR_CLIENT_ID:1}
# Software kill-switch (ENFORCED — Phase 0.2). true = refuse ALL order submission (market data still
# runs); false = trading allowed. Default false. Flip to true to halt new orders without disconnecting.
riskdesk.ibkr.native-read-only=false
riskdesk.ibkr.ssl-verify=false
riskdesk.ibkr.connect-timeout-ms=5000
riskdesk.ibkr.read-timeout-ms=30000

# Risk thresholds
riskdesk.risk.max-margin-usage-pct=80.0
riskdesk.risk.max-single-position-pct=25.0
riskdesk.risk.max-correlation-exposure-pct=50.0

# Telegram alerts (configure your bot)
riskdesk.alerts.telegram.enabled=true
riskdesk.alerts.telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
riskdesk.alerts.telegram.chat-id=${TELEGRAM_CHAT_ID:}

# Mentor AI (Gemini — full trade reviews)
# Disabled by default: the dashboard keeps saved reviews visible, but Mentor
# calls must be explicitly re-enabled in application-local.properties/env.
riskdesk.mentor.enabled=false
riskdesk.mentor.api-key=${GEMINI_API_KEY:}
riskdesk.mentor.model=${GEMINI_MODEL:gemini-3.1-pro-preview}
riskdesk.mentor.endpoint=https://generativelanguage.googleapis.com
riskdesk.mentor.timeout-ms=60000
riskdesk.mentor.auto-analysis-enabled=false
riskdesk.mentor.persist-audits=true
riskdesk.mentor.memory-enabled=true
riskdesk.mentor.memory-top-k=3
riskdesk.mentor.memory-search-window=200
riskdesk.mentor.embeddings-enabled=true
riskdesk.mentor.embeddings-model=${GEMINI_EMBEDDING_MODEL:gemini-embedding-001}
riskdesk.mentor.embedding-dimensions=768
riskdesk.mentor.import.enabled=false
riskdesk.mentor.import.file-path=
riskdesk.mentor.import.embedding-model=${GEMINI_EMBEDDING_MODEL:gemini-embedding-001}

# Vertex AI (trading agents + narrator — higher quota, gemini-2.0-flash)
riskdesk.vertex.enabled=true
riskdesk.vertex.api-key=${VERTEX_API_KEY:}
riskdesk.vertex.model=${VERTEX_MODEL:gemini-3.1-flash-lite-preview}
riskdesk.vertex.endpoint=https://generativelanguage.googleapis.com
riskdesk.vertex.timeout-ms=15000

# Mentor trade outcome tracker
riskdesk.trade-simulation.poll-ms=60000

# Trailing stop simulation (dual-track, runs alongside fixed SL/TP)
riskdesk.simulation.trailing-stop.enabled=true
riskdesk.simulation.trailing-stop.multiplier=1.0
riskdesk.simulation.trailing-stop.activation-threshold=0.5

# ─── Active Futures Contract Months ───────────────────────────────────────────
# Last-resort fallback values used when BOTH IBKR is unavailable at startup AND
# the database has no persisted contract (e.g. first-ever boot of a fresh install).
# In normal operation, the last contract confirmed via IBKR/operator is persisted
# in the `active_contract` table and used as the second-tier fallback — these
# values are only consulted on a truly cold start.
# Format: YYYYMM  (e.g. 202606 = June 2026 expiry/delivery for standard contracts).
# For MCL (CME energy), YYYYMM = expiry month, which is ONE MONTH before delivery.
riskdesk.active-contracts.MCL=202605
riskdesk.active-contracts.MGC=202506
riskdesk.active-contracts.MNQ=202506
riskdesk.active-contracts.E6=202606

# Calendar-based rollover: if front-month contract expires within this many days
# and OI data is unavailable, automatically roll to next contract.
riskdesk.rollover.calendar-days-threshold=32

# OI-based rollover: auto-confirm when next month OI > current month OI.
riskdesk.rollover.auto-confirm=true

# Auto-confirm safeguards — prevent premature rollovers from OI oscillations.
# * auto-confirm-oi-ratio: nextOI / currentOI must reach this multiple before
#   auto-roll fires. Values ~1.0x often drift around parity and caused
#   subscription churn (2026-04-10 MCL / MNQ incident). Default 2.0x.
# * auto-confirm-min-current-oi: guard against stale/zero-OI snapshots. Below
#   this floor, treat the comparison as unreliable and skip auto-roll.
# ENERGY instruments (MCL) are always excluded from auto-confirm — IBKR's
# expiry-month semantics don't match the active delivery month, so OI shifts
# require operator review via POST /api/rollover/confirm.
riskdesk.rollover.auto-confirm-oi-ratio=2.0
riskdesk.rollover.auto-confirm-min-current-oi=100

# DXY is now synthetic and computed from six FX pairs via IBKR Gateway FX quotes.
# It no longer participates in futures contract rollover or active-contract fallback config.

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=RiskDesk
info.app.version=${APP_VERSION:0.1.0-SNAPSHOT}
info.app.description=Risk management dashboard for futures traders
info.app.git-sha=${APP_GIT_SHA:unknown}
info.app.image-tag=${APP_IMAGE_TAG:unknown}
info.app.build-time=${APP_BUILD_TIME:unknown}

# OpenAPI / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Logging
logging.level.com.riskdesk=INFO
logging.level.org.springframework.web.socket=INFO
logging.level.org.springframework.boot.devtools.env.DevToolsPropertyDefaultsPostProcessor=OFF

# Batch insert optimization for high-volume tick logging
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ── S4 — Strategy execution gate ──────────────────────────────────────────
# VETO_ONLY concurrence check: when enabled, enrolled instruments require BOTH
# the legacy Mentor review AND the probabilistic strategy engine to approve a
# trade before IBKR contact. Default off — production behaviour is unchanged.
# Flip per-instrument for gradual rollout:
#   riskdesk.strategy.execution-gate.enabled=true
#   riskdesk.strategy.execution-gate.instruments=MGC,MCL
# The gate can only block trades, never create them. When the engine is
# unavailable or errors, the gate fails CLOSED (blocks) for enrolled
# instruments — toggle the instrument off if you need to bypass during an
# engine outage.
riskdesk.strategy.execution-gate.enabled=false
riskdesk.strategy.execution-gate.instruments=


# ── Order-flow subscriptions (tick-by-tick + depth) ─────────────────────
# Trimmed to the two traded instruments (MNQ, MCL) to reduce concurrent IBKR
# market-data pressure. 4 tick-by-tick AllLast lines on one clientId is a frequent
# cause of tickSubscribed:true / totalTicksReceived:0 (354/10089 entitlement,
# 10197 competing session). Pressure reduction, NOT a provable cap fix — confirm
# via GET /api/order-flow/status. MGC,E6 are reported DEGRADED_NOT_SUBSCRIBED.
riskdesk.order-flow.tick-by-tick.instruments=MNQ,MCL
riskdesk.order-flow.tick-by-tick.degraded-instruments=MGC,E6
riskdesk.order-flow.depth.instruments=MNQ,MCL
# Classification resilience: cache the last-known-good BBO for up to N seconds (the
# price stream nulls bid/ask after 30s), and fall back to the trade-to-trade tick
# rule when no fresh BBO/quote exists so ticks are never dropped as UNCLASSIFIED.
# Tick-rule windows are stamped REAL_TICKS_TICKRULE (0.5 confidence), never REAL.
riskdesk.order-flow.tick-by-tick.bbo-max-staleness-seconds=90
riskdesk.order-flow.tick-by-tick.tick-rule-fallback-enabled=true
riskdesk.order-flow.tick-by-tick.real-ticks-min-quote-fraction=0.5
# Single-owner resubscription rate cap (shared across all watchdog loops).
riskdesk.order-flow.tick-by-tick.max-resubscribes-per-minute=2
riskdesk.order-flow.tick-by-tick.internal-watchdog-resubscribes=false
# Delta freshness watchdog: resubscribe a tick line whose last CLASSIFIED tick is
# older than this (the tick equivalent of the depth freshness watchdog).
riskdesk.order-flow.freshness.delta-staleness-seconds=45


# ── Smart-Money Cycle Detection ─────────────────────────────────────────
# Institutional distribution / accumulation setups (chained absorption events).
riskdesk.order-flow.distribution.enabled=true
riskdesk.order-flow.distribution.min-consecutive-count=3
riskdesk.order-flow.distribution.min-avg-score=2.5
riskdesk.order-flow.distribution.window-ttl-minutes=15
riskdesk.order-flow.distribution.max-inter-event-gap-seconds=20

# Aggressive momentum bursts (fills the detection gap during active trends).
riskdesk.order-flow.momentum.enabled=true
# Score is sigmoid-bounded [0,1] — threshold must be < 1.0. Was mistakenly set to 2.0
# (legacy absolute-scale value) which made detection mathematically impossible.
riskdesk.order-flow.momentum.score-threshold=0.55
riskdesk.order-flow.momentum.min-price-move-fraction-of-atr=0.3
# REST history cutoff: events older than this many minutes are excluded from
# GET /api/order-flow/momentum/{instrument}. Live /topic/momentum is unaffected.
riskdesk.order-flow.momentum.history-max-age-minutes=120

# Meta-detector chaining distribution -> momentum -> accumulation.
riskdesk.order-flow.cycle.enabled=true
riskdesk.order-flow.cycle.momentum-window-minutes=15
riskdesk.order-flow.cycle.mirror-window-minutes=30
riskdesk.order-flow.cycle.cooldown-minutes=5
# Minimum confidence (0-100) for a cycle signal to be exposed (REST + /topic/cycle).
# Detector state machine still emits all phases internally; persistence keeps everything.
riskdesk.order-flow.cycle.min-confidence=70

# ── Book-manipulation detection (L2 wall events) ────────────────────────
# Iceberg (UC-OF-014): repeated APPEARED->DISAPPEARED->APPEARED recharge cycles
# at one price level. Spoofing (UC-OF-005): large wall pulled before it can fill.
# Both scan recent wall events on a 2s loop; RecentSignalGate de-dups re-scans so
# a pattern still inside the lookback window is emitted once, not on every scan.
riskdesk.order-flow.iceberg.enabled=true
riskdesk.order-flow.iceberg.eval-interval-ms=2000
riskdesk.order-flow.iceberg.lookback-seconds=60
riskdesk.order-flow.iceberg.dedup-seconds=60
# Only emit icebergs scoring >= this (0-100). 50 = at least 2 recharges.
riskdesk.order-flow.iceberg.min-score=50

riskdesk.order-flow.spoofing.enabled=true
riskdesk.order-flow.spoofing.lookback-seconds=30
riskdesk.order-flow.spoofing.dedup-seconds=30
riskdesk.order-flow.spoofing.min-score=1.0

# Flash crash (UC-OF-006): stateful FSM evaluated live on the 5s order-flow loop.
# Thresholds come from the persisted FlashCrashConfigPort (per-instrument) with
# FlashCrashThresholds.defaults() as fallback. Event fires only on phase transition.
riskdesk.order-flow.flash-crash.enabled=true
riskdesk.order-flow.flash-crash.window-seconds=5
riskdesk.order-flow.flash-crash.volume-history-size=12

# ── Perfect Setup (order-flow confluence detector) ──────────────────────
# Fuses 6 order-flow axes (regime, iceberg, absorption, value vs VWAP/BB,
# liquidity-grab reversal, R:R) into a transition-based ARMED signal published
# on /topic/perfect-setup and GET /api/perfect-setup. Advisory by default.
riskdesk.perfect-setup.enabled=true
riskdesk.perfect-setup.eval-interval-ms=5000
riskdesk.perfect-setup.instruments=MNQ,MGC,MCL
# Confluence: number of passing axes (0-6) to ARM; R:R >= min-rr is a hard gate.
riskdesk.perfect-setup.arm-threshold=4
riskdesk.perfect-setup.regime-min-conf=70
riskdesk.perfect-setup.iceberg-min-score=50
riskdesk.perfect-setup.near-level-ticks=40
riskdesk.perfect-setup.bb-low=0.25
riskdesk.perfect-setup.bb-high=0.75
riskdesk.perfect-setup.absorption-climax-min-score=8.0
riskdesk.perfect-setup.flash-reversal-min-score=50.0
riskdesk.perfect-setup.min-rr=2.0
riskdesk.perfect-setup.sl-buffer-atr-fraction=0.5
riskdesk.perfect-setup.arm-ttl-seconds=900
riskdesk.perfect-setup.cooldown-seconds=300
# Opt-in bridge to the auto-arm pipeline. OFF by default — when true an ARM
# transition creates a PENDING execution via QuantAutoArmService (still no live
# order unless riskdesk.quant.auto-submit.enabled is also true). Requires
# riskdesk.quant.auto-arm.broker-account-id to be set.
riskdesk.perfect-setup.auto-arm.enabled=false
riskdesk.perfect-setup.auto-arm.size-percent=0.005

# ── Order-flow quick execution (Mentor bypass) ──────────────────────────
# Disabled by default. When enabled, POST /api/orderflow/quick-execution
# creates a synthetic mentor review + execution row from raw entry/SL/TP.
# The IBKR order is STILL only sent when the user calls
# POST /api/mentor/executions/{id}/submit-entry.
riskdesk.orderflow.quick-execution.enabled=false

# ----- External Setup pipeline (Claude wakeup → SaaS validation) ----------
# When the Claude monitoring loop pushes a setup, it lands here in PENDING and
# the user validates / rejects from the dashboard. Validation reuses the
# orderflow quick-execution pipeline (synthetic Mentor review → IBKR entry).
# Validation requires riskdesk.orderflow.quick-execution.enabled=true.
riskdesk.external-setup.enabled=true
# Set to a long random token in application-local.properties / env. POST is rejected if blank.
riskdesk.external-setup.api-token=
riskdesk.external-setup.default-ttl=PT5M
riskdesk.external-setup.ttl.MNQ=PT3M
riskdesk.external-setup.ttl.MGC=PT5M
riskdesk.external-setup.ttl.MCL=PT5M
riskdesk.external-setup.ttl.E6=PT8M
riskdesk.external-setup.auto-execute-on-high-confidence=false
riskdesk.external-setup.default-quantity=1
riskdesk.external-setup.default-broker-account=
riskdesk.external-setup.rate-limit-per-minute=12
riskdesk.external-setup.expiry-check-period-ms=30000
riskdesk.external-setup.expiry-initial-delay-ms=30000

# ----- Quant 7-Gates evaluator + AI advisor (tier 2) ---------------------
# Tier 1 (deterministic gates) is always on — runs every 60 s.
riskdesk.quant.scan-interval-ms=60000
riskdesk.quant.scan-initial-delay-ms=30000
# Tier 2 advisor — disabled by default (opt-in once GEMINI_API_KEY is set
# and pgvector is available on the target Postgres).
riskdesk.quant.advisor.enabled=false
# Score at which auto-advice fires (only once per session per instrument).
riskdesk.quant.ai-advice-trigger-score=6
# How long an advisor verdict is cached per-instrument before a re-fire.
riskdesk.quant.ai-advice-cache-seconds=30
# Top-K nearest situations pulled from the quant_memory pgvector table.
riskdesk.quant.memory-rag-top-k=5
# Defaults to riskdesk.mentor.model when unset.
# riskdesk.quant.advisor-model=gemini-3.1-pro-preview
riskdesk.quant.advisor-temperature=0.2

# ----- Quant 7-Gates Simulation → Auto-IBKR mirror -----------------------
# When ENABLED, each qualified paper OPEN from Quant7GatesSimulationService
# routes one Limit entry to IBKR and each paper CLOSE (SL / TP / flow-AVOID)
# flattens it — the broker position follows the simulation 1:1. Entry-Limit
# only, no resident broker stop. Orders route to the gateway's session managed
# account (placeholder, resolved by IbGatewayNativeClient) — no account to
# configure, exactly like WTX-RSI. ENABLED by default (operator decision
# 2026-06-03); no order is placed until a MNQ/MCL panel toggle is armed (default
# OFF) and IBKR is connected. Tests force this OFF in application-test.properties.
riskdesk.quant.sim-exec.enabled=true
# Hard allowlist — only these instruments can ever route a live order. MGC is
# excluded (net-negative in sim history) and 6E/E6 is not scanned at all.
riskdesk.quant.sim-exec.instruments=MNQ,MCL
riskdesk.quant.sim-exec.default-quantity=1
# Flatten reconciler — re-attempts an orphaned flatten (paper sim closed but the
# IBKR position is still open after a failed/skipped close) so one transient
# failure can never leave a position open indefinitely.
riskdesk.quant.sim-exec.reconcile-interval-ms=30000
riskdesk.quant.sim-exec.reconcile-initial-delay-ms=45000
# Force-close all mirrored positions before the CME daily break (no resident
# broker stop → never carry a position through the close). Swept every minute
# 16:55–16:59 ET so a late fill is still flattened before the 17:00 break.
riskdesk.quant.sim-exec.force-close-enabled=true
riskdesk.quant.sim-exec.force-close-cron=0 55-59 16 * * MON-FRI
# No new entry armed at/after this ET time (pre-close cutoff) so no fresh resting
# DAY entry is placed right before the break.
riskdesk.quant.sim-exec.no-new-entries-after=16:50
# Ticks to cross the reference price by so the flatten limit is marketable.
riskdesk.quant.sim-exec.flatten-cross-ticks=10

# ----- Quant auto-arm pipeline (PR #303) ---------------------------------
# Stage 1 — auto-arm: when ENABLED, every quant scan whose snapshot passes
# AutoArmEvaluator's gates (min-score, no active execution, cooldown elapsed,
# kill-zone active) creates a TradeExecution row in PENDING_ENTRY_SUBMISSION
# but does NOT submit to IBKR. The frontend gets an auto-arm event and shows
# a yellow "ARMED" badge with [FIRE NOW] / [CANCEL] buttons.
# Default OFF — flip to true ONLY after the operator has reviewed the
# broker-account-id and default-quantity for this deployment.
riskdesk.quant.auto-arm.enabled=false
riskdesk.quant.auto-arm.min-score=7
riskdesk.quant.auto-arm.expire-seconds=120
riskdesk.quant.auto-arm.cooldown-seconds=60
riskdesk.quant.auto-arm.size-percent-default=0.005
# REQUIRED when enabled — must match a real IBKR account (e.g. DU1234567 paper).
riskdesk.quant.auto-arm.broker-account-id=
riskdesk.quant.auto-arm.default-quantity=1

# Stage 2 — auto-submit: when ENABLED, the scheduler fires a ticking poll
# every second; any QUANT_AUTO_ARM execution older than delay-seconds is
# automatically submitted to IBKR via ExecutionManagerService.
# Default OFF so a stage-1 enable still requires a human to click [FIRE NOW].
riskdesk.quant.auto-submit.enabled=false
riskdesk.quant.auto-submit.delay-seconds=30
riskdesk.quant.auto-submit.tick-millis=1000

# ── WaveTrend XT Strategy (WTX) ────────────────────────────────────────────
# Set enabled=true to activate the autonomous WTX strategy engine.
# The strategy is completely independent from the alert/Mentor pipeline.
riskdesk.wtx.enabled=true
riskdesk.wtx.instruments=MNQ,MCL,MGC,E6
riskdesk.wtx.timeframes=5m,10m
# WaveTrend periods. n1=channel, n2=average, signal-period=wt2 SMA. Real-1m backtest (2 windows,
# MNQ 5m/10m) landed on 10/28 + sig 2 as the most consistent default; editable per-(instrument,
# timeframe) from the frontend (overrides fall back to these globals).
riskdesk.wtx.n1=10
riskdesk.wtx.n2=28
riskdesk.wtx.signal-period=2
riskdesk.wtx.nsc=53.0
riskdesk.wtx.nsv=-53.0
# compra/venta = extreme zone signals (wt1 <= -53 / >= +53)
# compra_1/venta_1 = all crossovers (no zone filter) — same as TV default
riskdesk.wtx.use-compra=true
riskdesk.wtx.use-compra1=true
riskdesk.wtx.use-venta=true
riskdesk.wtx.use-venta1=true
riskdesk.wtx.reverse-on-opp=true
riskdesk.wtx.fixed-qty=2.0
riskdesk.wtx.max-daily-loss-usd=500.0
riskdesk.wtx.force-close-ny=true
riskdesk.wtx.ny-session-end-hour=16
riskdesk.wtx.ny-session-end-min=40
riskdesk.wtx.close-before-min=12
riskdesk.wtx.initial-equity=10000.0
# Exit mode (profile >= SESSION_ATR). SL_ONLY = fixed initial SL only, NO trailing ratchet — the
# position rides to the opposite WaveTrend cross. Real-1m backtest (true intrabar path) showed the
# tight trailing ratchet was net-NEGATIVE (it clipped winners / whipsawed); the wide fixed SL alone
# preserved the edge while bounding the tail. POINTS/ATR kept for reversibility (activation/trail
# points are ignored in SL_ONLY but retained for schema stability). slPoints=0 → SL = slAtrMult*ATR.
riskdesk.wtx.trailing-mode=SL_ONLY
riskdesk.wtx.trailing-activation-points=30
riskdesk.wtx.trailing-points=15
riskdesk.wtx.sl-points=0
# slAtrMult 2.0: backtest sweep showed 1.3 was too tight (stop-out leak n°1) — widening to
# 1.6–2.0×ATR improved P&L, PF AND win rate simultaneously. 2.0 = the robust end of that range.
riskdesk.wtx.sl-atr-mult=2.0
# 30/15 are MNQ-scale — MCL/MGC/E6 keep instrument-relative ATR trailing (a +30 move ~never arms there).
# Empty = apply POINTS to all instruments. Tune per-instrument before adding more here.
riskdesk.wtx.trailing-points-instruments=MNQ
# Auto-clear the daily max-loss latch + rebaseline equity at 17:00 ET (CME day boundary), so a
# stuck "blocked on a new day" state self-heals even without a fresh candle. Set false to disable.
riskdesk.wtx.daily-reset-enabled=true
# Session entry filter: block NEW entries (OPEN / REVERSE-open) during the weak session window.
# Boundaries are America/New_York (DST-safe) and wrap past midnight. Existing positions stay managed
# (exits run); only fresh entries are gated.
#
# Window moved from Asia/overnight (18:00->03:00) to LONDON (03:00->08:00) for forward-paper:
# the original overnight block was tuned for the TRAILING exit (whipsawed in thin overnight chop).
# The deployed SL_ONLY/ride exit FLIPS it — on the real-1m backtest (2 windows, ~82d) the overnight
# session is the ride config's BEST (+~7.5k$/82d qty1) while LONDON/UK is the genuinely weak one (5m
# mild, 10m negative). Moving the block to London gained ~+7.6k$ net/82d. CAVEAT: that gain = trading
# overnight, where execution (thin-liquidity slippage) is NOT modeled — hence forward-paper (Auto-IBKR
# OFF) before trusting it. Revert to 18:00->03:00 to restore the old block. (The WtxStrategyProperties
# Java default stays 18:00->03:00 as the conservative fallback.)
riskdesk.wtx.session-filter-enabled=true
riskdesk.wtx.session-block-start-et=03:00
riskdesk.wtx.session-block-end-et=08:00
# HTF is the validated default profile for these instruments — a boot reconciler upgrades any
# (instrument, timeframe) still on BASELINE to HTF, without overriding a manual SESSION_ATR/STRICT.
riskdesk.wtx.htf-default-instruments=MNQ
# Variant panels — parallel named WTX signals evaluated on the same closed candles as the legacy
# panel, with their own state / signal history / overrides under a short panel key. top-train-Z35:
# zone-only entries (±35, every-cross off), WaveTrend 5/14/2, SL 4.0×ATR SL_ONLY ride — from the
# real-1m train(mars-avril)/OOS(mai-juin) 2026 study. Paper by default (auto-execution OFF like any
# fresh panel); validate forward before any live routing.
riskdesk.wtx.variants[0].name=top-train-Z35
riskdesk.wtx.variants[0].instrument=MNQ
riskdesk.wtx.variants[0].base-timeframe=10m
riskdesk.wtx.variants[0].preset=top-train-z35
riskdesk.wtx.variants[0].panel-key=10m-z35
# HTF-bias early exit ("A2"): close an open position when the 1h bias no longer SUPPORTS its
# direction (turned NEUTRAL or opposite) — in addition to the normal SL / opposite-WT reverse.
# Real-1m backtest on MNQ 10m (2 windows, ~82d, qty1): +60% net vs ride-only, WR 32%->46%, robust
# on both windows. The 1h bias only changes on 1h closes, so the exit is evaluated on each closed
# 10m candle with no cross-timeframe coupling. OFF: pure ride (SL + opposite-cross only). Set to
# true to re-enable the HTF-bias early exit. Java default is OFF (conservative fallback).
riskdesk.wtx.htf-bias-exit-enabled=false
# Margin pre-flight: OFF — the PORTFOLIO_HEURISTIC (15% of notional) over-estimated futures
# margin ~3.5x for micro index futures and produced false NO MARGIN denials on reverses IBKR
# would have accepted. IBKR's own margin check is authoritative; let it decide.
riskdesk.wtx.preflight-mode=OFF

# Stale ENTRY_SUBMITTED reconciler — recovers a frozen strategy when an entry's orderStatus
# callback was missed (disconnect/restart/DAY-order expiry while down) and the row stuck in
# ENTRY_SUBMITTED. Looks each stale row up at IBKR (live then completed orders) and reconciles:
# Cancelled/Inactive -> CANCELLED, Filled -> ACTIVE, live -> left, not-found + IBKR-flat -> CANCELLED.
# No broker side effect.
riskdesk.wtx.stale-entry.reconcile-interval-ms=60000
riskdesk.wtx.stale-entry.initial-delay-ms=60000
# Grace before a freshly-submitted row is eligible (let the normal ack/fill flow land first).
riskdesk.wtx.stale-entry.grace-seconds=120

# ── Execution close reconciler (all strategies) ────────────────────────────
# Out-of-band sweep that promotes EXIT_SUBMITTED rows whose close FILLED but whose
# orderStatus(Filled) callback was lost (marketable close fills during submit, before
# the close orderId is persisted). It REPLAYS the missed callback through the live
# fill-tracking path only when IBKR is confirmed FLAT for the instrument and no order
# is still working — never places an order, never acts on an outage. Disable to halt.
riskdesk.execution.close-reconcile.enabled=true
riskdesk.execution.close-reconcile.interval-ms=60000
riskdesk.execution.close-reconcile.initial-delay-ms=90000
riskdesk.execution.close-reconcile.grace-seconds=90
# Also close ACTIVE rows the app believes open but IBKR holds no position for (phantom — missed close
# fill or external close), and cancel ENTRY_SUBMITTED rows whose order never reached the exchange
# (PendingSubmit never transmitted / order gone) while IBKR is flat — both let a reversal strategy resync
# its virtual state to FLAT and stop SKIPPED_ENTRY_IN_FLIGHT. DEBOUNCED: only after IBKR is confirmed
# reconcilable for the row continuously for confirm-seconds, so a transient empty snapshot / a
# freshly-submitted entry is never touched. A genuinely-working resting limit (Submitted/PreSubmitted/
# PartiallyFilled) is left alone. Set either flag false to disable just that path.
riskdesk.execution.close-reconcile.reconcile-active-phantoms=true
riskdesk.execution.close-reconcile.reconcile-stuck-entries=true
riskdesk.execution.close-reconcile.confirm-seconds=120

# ── Marketable exit pricing (all strategies via OrderRouter) ───────────────
# A reducing leg — REVERSE-close, CLOSE, FLATTEN — is priced as a MARKETABLE LIMIT: the internal live price
# (IBKR Gateway -> PostgreSQL -> services, with live-vs-DB provenance — NOT a direct broker read) crossed by
# cross-ticks so it fills immediately like a market order instead of resting at the passive intent price and
# leaving the user holding an unwanted position (the reversal-close bug). Stays a LIMIT (the deliberate
# limit-only broker path) so cross-ticks caps worst-case slippage — safer than a raw MKT on thin micro books.
# SELL crosses the price DOWN, BUY UP, by cross-ticks · minTick. Only a genuinely-live, fresh price is
# crossed (LIVE_PUSH/LIVE_PROVIDER, < 20s); a FALLBACK_DB candle or stale value falls back to the passive
# limit (crossing a stale price would falsely look marketable yet rest). Entries stay passive by design.
# Same source and principle as the Quant force-close (riskdesk.quant.sim-exec.flatten-cross-ticks).
# enabled=false reverts exits to the legacy passive limit.
# NOTE: these three values are the SEED DEFAULTS only. At runtime the operator controls them live from the
# UI (like Auto-IBKR) via GET/PUT /api/execution/marketable-settings — persisted in the singleton table
# execution_marketable_settings (survives restart) and read by DefaultOrderRouter per order. Once the
# operator saves once, the persisted value wins over these defaults.
riskdesk.execution.marketable-close.enabled=true
riskdesk.execution.marketable-close.cross-ticks=10
# Also price the OPEN leg of a REVERSE marketable (crossed by the same cross-ticks) — but ONLY when a flatten
# actually happened — so the flip COMPLETES instead of leaving the user flat when price moved past the passive
# entry. Plain OPENs (fresh entries, nothing flattened) always stay passive. Bounded: if price gapped beyond
# cross-ticks the open still rests (no runaway chase). Set false to keep the reverse open passive (legacy).
riskdesk.execution.marketable-reverse-open.enabled=true

# ── Unified order router (strategy-migration kill-switch) ──────────────────
# unified-router.enabled (default false, set via @ConfigurationProperties) routes a migrated strategy
# through the unified OrderRouter instead of its legacy per-strategy bridge. MUST stay OFF until the
# router reaches parity with the battle-tested legacy path.
# stale-close-retry-seconds is the router's stuck-close retry grace — the mirror of
# riskdesk.wtx.stale-close-retry-seconds (PR #409). When a close is stuck in EXIT_SUBMITTED past this
# window AND broker truth confirms IBKR still holds the position on the row's side (a dropped ack / fill,
# or a marketable close that gapped out and died), the router re-fires a FRESH close instead of skipping
# it as a duplicate — breaking the dead-lock where the instrument freezes and the live position is left
# unmanaged until the background close reconciler recovers it 60-90s later. 0 disables the retry (legacy
# unconditional duplicate-skip). Default 45 (matches the legacy WTX grace).
riskdesk.execution.unified-router.stale-close-retry-seconds=45

# ── Daily loss cap (broker-truth hard stop) ────────────────────────────────
# Periodically reads IBKR realized P&L for the CME trading day. When it falls to <= -threshold-usd, NEW
# auto-entries are halted across every strategy (closes stay allowed) and a Telegram alarm fires. Sticky
# for the day; auto re-arms at the next 17:00 ET boundary (IBKR daily realized P&L resets) or via the
# reset endpoint. OFF by default (threshold 0). Set a positive threshold to arm. account blank = default
# managed account.
riskdesk.execution.loss-cap.enabled=true
riskdesk.execution.loss-cap.threshold-usd=300
riskdesk.execution.loss-cap.account=
riskdesk.execution.loss-cap.interval-ms=30000
riskdesk.execution.loss-cap.initial-delay-ms=60000

# ── PLAYBOOK Automation ────────────────────────────────────────────────────
# Runs only from closed candles fed by IBKR -> PostgreSQL -> internal services.
# Auto-IBKR remains OFF per (instrument,timeframe) until explicitly enabled.
riskdesk.playbook.automation.enabled=true
riskdesk.playbook.automation.instruments=MCL,MGC,MNQ,E6
riskdesk.playbook.automation.timeframes=5m,10m,1h

# ── WTX+RSI strategy ───────────────────────────────────────────────────────
# Live executor mirrors WtxStrategyService: @EventListener(CandleClosed), per
# (instrument, timeframe) state, optional IBKR routing gated by the panel toggle.
# Signal evaluation is ON by default; live IBKR routing stays gated by the
# per-row autoExecutionEnabled flag (POST /api/strategy/wtxrsi/state/{i}/{tf}/auto-execution).
# Override to false in application-local.properties if you don't want the listener
# firing on every CandleClosed during local development.
riskdesk.wtxrsi.enabled=true
riskdesk.wtxrsi.instruments=MNQ
riskdesk.wtxrsi.timeframes=5m
riskdesk.wtxrsi.zone-mode=STRICT_ZONE
riskdesk.wtxrsi.sync-lookback-bars=3
riskdesk.wtxrsi.fractal-left-right=2
riskdesk.wtxrsi.fractal-max-lookback=20
riskdesk.wtxrsi.tp-mode=REVERSAL
riskdesk.wtxrsi.chaikin-enabled=true
# Entry gate (ENABLED in this baseline, reversible). When true, a position only
# OPENS if the Chaikin oscillator confirms the signal direction; unconfirmed
# signals are suppressed. Exits (reversal-on-opposite-signal, SL/TP) are
# unaffected. Only effective when chaikin-enabled=true. Set to false (per env /
# profile) to disable and let every qualified signal open.
riskdesk.wtxrsi.chaikin-required=true
# Swing-bias source used by the optional swingBiasFilter toggle:
#   FRACTAL_HH_HL — derived from the same Williams fractals used for the SL (self-contained, no SMC engine call).
#   SMC_ENGINE    — reuses IndicatorService.swingBias() (BOS / CHoCH-aware, same source as WTx).
# Default FRACTAL_HH_HL because it's deterministic in tests and matches the SL definition. Flip to
# SMC_ENGINE in production to share the structural notion of "trend" with the WTx strategy.
riskdesk.wtxrsi.bias-source=FRACTAL_HH_HL
